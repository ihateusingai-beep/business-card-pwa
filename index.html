<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>個人名片 | Personal Card</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+HK:wght@400;500;700&display=swap');

        :root {
            --gold: #FFD700;
            --pink: #FF69B4;
            --cyan: #00FFFF;
            --dark-bg: #0A0A0F;
            --card-bg: #1A1A2E;
            --surface: #16213E;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans HK', 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #0A0A0F 0%, #1A1A2E 50%, #0A0A0F 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 4px;
        }

        .header .subtitle {
            font-size: 14px;
            color: var(--cyan);
            margin-top: 4px;
            letter-spacing: 2px;
        }

        /* Unicorn Emblem */
        .emblem {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: radial-gradient(circle, rgba(255,215,0,0.8) 0%, rgba(255,105,180,0.4) 50%, transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        .emblem span {
            font-size: 56px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        .card-name {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }

        .card-name-en {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 16px 0;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-icon {
            font-size: 20px;
            width: 36px;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 16px;
            word-break: break-all;
        }

        /* QR Code Section */
        .qr-section {
            text-align: center;
        }

        .qr-title {
            font-size: 18px;
            color: var(--cyan);
            margin-bottom: 16px;
        }

        .qr-container {
            background: white;
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
        }

        #qrcode canvas {
            border-radius: 8px;
        }

        .qr-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--dark-bg);
        }

        .btn-primary:hover {
            background: #ffed4a;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #1e2a4a;
        }

        /* Edit Mode */
        .edit-mode {
            display: none;
        }

        .edit-mode.active {
            display: block;
        }

        .view-mode {
            display: block;
        }

        .view-mode.hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* Quote */
        .quote {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--pink);
            opacity: 0.8;
            font-style: italic;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--dark-bg);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        /* Lang Toggle */
        .lang-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .lang-toggle:hover {
            background: rgba(0,255,255,0.1);
        }
    </style>
</head>
<body>
    <button class="lang-toggle" onclick="toggleLang()">中文</button>
    
    <div class="container">
        <div class="header">
            <h1>UNICORN</h1>
            <div class="subtitle" id="header-subtitle">PERSONAL CARD</div>
        </div>

        <div class="emblem">
            <span>🦄</span>
        </div>

        <!-- View Mode -->
        <div class="view-mode" id="viewMode">
            <div class="card fade-in">
                <div class="card-name" id="displayName">程棨彥</div>
                <div class="card-name-en" id="displayNameEn">Cheng Kai Yin</div>
                <div class="divider"></div>
                <div class="info-row">
                    <span class="info-icon">📱</span>
                    <div>
                        <div class="info-label" id="labelPhone">電話</div>
                        <div class="info-value" id="displayPhone">92187444</div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-icon">✉️</span>
                    <div>
                        <div class="info-label" id="labelEmail">電郵</div>
                        <div class="info-value" id="displayEmail">kencheng1204@hotmail.com</div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-icon">🏫</span>
                    <div>
                        <div class="info-label" id="labelSchool">學校</div>
                        <div class="info-value" id="displaySchool">匡智張玉瓊晨輝學校</div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-icon">💼</span>
                    <div>
                        <div class="info-label" id="labelPosition">職位</div>
                        <div class="info-value" id="displayPosition">教師</div>
                    </div>
                </div>
            </div>

            <div class="card qr-section">
                <div class="qr-title" id="qrTitle">掃描添加聯絡人</div>
                <div class="qr-container">
                    <div id="qrcode"></div>
                </div>
                <div class="qr-label" id="qrLabel">二維碼</div>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" onclick="showEdit()" id="btnEditView">編輯資料</button>
            </div>
        </div>

        <!-- Edit Mode -->
        <div class="edit-mode" id="editMode">
            <div class="card">
                <h2 style="color: var(--gold); margin-bottom: 8px;" id="editTitle">編輯名片</h2>
                <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 20px;" id="editSubtitle">更新您的聯絡資料</p>

                <div class="form-group">
                    <label class="form-label" id="labelName">姓名（中文）</label>
                    <input type="text" class="form-input" id="inputName">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelNameEn">姓名（英文）</label>
                    <input type="text" class="form-input" id="inputNameEn">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelPhoneEdit">電話</label>
                    <input type="tel" class="form-input" id="inputPhone">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelEmailEdit">電郵</label>
                    <input type="email" class="form-input" id="inputEmail">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelSchoolEdit">學校（中文）</label>
                    <input type="text" class="form-input" id="inputSchool">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelSchoolEnEdit">學校（英文）</label>
                    <input type="text" class="form-input" id="inputSchoolEn">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelPositionEdit">職位（中文）</label>
                    <input type="text" class="form-input" id="inputPosition">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelPositionEnEdit">職位（英文）</label>
                    <input type="text" class="form-input" id="inputPositionEn">
                </div>
                <div class="form-group">
                    <label class="form-label" id="labelWebsiteEdit">網站（可選）</label>
                    <input type="url" class="form-input" id="inputWebsite">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveContact()" id="btnSave">儲存</button>
                <button class="btn btn-secondary" onclick="cancelEdit()" id="btnCancel">取消</button>
            </div>
        </div>

        <div class="quote" id="quote">「我會展示奇蹟俾你睇！」— 獨角獸高達</div>
    </div>

    <div class="toast" id="toast">已儲存！</div>

    <script>
        // Data
        let contacts = {
            name: '程棨彥',
            nameEn: 'Cheng Kai Yin',
            phone: '92187444',
            email: 'kencheng1204@hotmail.com',
            school: '匡智張玉瓊晨輝學校',
            schoolEn: 'Hong chi Chang Yu King Chan Fai School',
            position: '教師',
            positionEn: 'Teacher',
            website: ''
        };

        let isEnglish = false;
        let isEditMode = false;

        // Load from localStorage
        function loadData() {
            const saved = localStorage.getItem('businessCard');
            if (saved) {
                contacts = JSON.parse(saved);
            }
        }

        // Save to localStorage
        function saveData() {
            localStorage.setItem('businessCard', JSON.stringify(contacts));
        }

        // Generate vCard
        function generateVCard() {
            return `BEGIN:VCARD
VERSION:3.0
FN:${contacts.name}
FN;CHARSET=UTF-8:${contacts.nameEn}
N:${contacts.name};;;
TEL;TYPE=CELL:${contacts.phone}
EMAIL:${contacts.email}
ORG:${contacts.school}
TITLE:${contacts.position}
${contacts.website ? 'URL:' + contacts.website : ''}
END:VCARD`;
        }

        // Render QR Code
        function renderQR() {
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            QRCode.toCanvas(generateVCard(), {
                width: 200,
                margin: 0,
                color: {
                    dark: '#000000',
                    light: '#ffffff'
                }
            }, function(err, canvas) {
                if (!err) {
                    container.appendChild(canvas);
                }
            });
        }

        // Update UI
        function updateUI() {
            document.getElementById('displayName').textContent = contacts.name;
            document.getElementById('displayNameEn').textContent = contacts.nameEn;
            document.getElementById('displayPhone').textContent = contacts.phone;
            document.getElementById('displayEmail').textContent = contacts.email;
            document.getElementById('displaySchool').textContent = isEnglish ? contacts.schoolEn : contacts.school;
            document.getElementById('displayPosition').textContent = isEnglish ? contacts.positionEn : contacts.position;
            
            // Labels
            document.getElementById('labelPhone').textContent = isEnglish ? 'Phone' : '電話';
            document.getElementById('labelEmail').textContent = isEnglish ? 'Email' : '電郵';
            document.getElementById('labelSchool').textContent = isEnglish ? 'School' : '學校';
            document.getElementById('labelPosition').textContent = isEnglish ? 'Position' : '職位';
            
            // QR
            document.getElementById('qrTitle').textContent = isEnglish ? 'Scan to Add Contact' : '掃描添加聯絡人';
            document.getElementById('qrLabel').textContent = isEnglish ? 'QR Code' : '二維碼';
            
            renderQR();
        }

        // Toggle Language
        function toggleLang() {
            isEnglish = !isEnglish;
            const btn = document.querySelector('.lang-toggle');
            btn.textContent = isEnglish ? 'EN' : '中文';
            
            document.getElementById('header-subtitle').textContent = isEnglish ? 'PERSONAL CARD' : '個人名片';
            document.getElementById('quote').textContent = isEnglish 
                ? '"I will show you a miracle!" - Unicorn Gundam'
                : '「我會展示奇蹟俾你睇！」— 獨角獸高達';
            
            updateUI();
        }

        // Show Edit Mode
        function showEdit() {
            document.getElementById('viewMode').classList.add('hidden');
            document.getElementById('editMode').classList.add('active');
            
            // Fill form
            document.getElementById('inputName').value = contacts.name;
            document.getElementById('inputNameEn').value = contacts.nameEn;
            document.getElementById('inputPhone').value = contacts.phone;
            document.getElementById('inputEmail').value = contacts.email;
            document.getElementById('inputSchool').value = contacts.school;
            document.getElementById('inputSchoolEn').value = contacts.schoolEn;
            document.getElementById('inputPosition').value = contacts.position;
            document.getElementById('inputPositionEn').value = contacts.positionEn;
            document.getElementById('inputWebsite').value = contacts.website || '';
            
            updateEditLabels();
        }

        function updateEditLabels() {
            document.getElementById('editTitle').textContent = isEnglish ? 'Edit Contact' : '編輯名片';
            document.getElementById('editSubtitle').textContent = isEnglish ? 'Update your contact info' : '更新您的聯絡資料';
            document.getElementById('labelName').textContent = isEnglish ? 'Name (Chinese)' : '姓名（中文）';
            document.getElementById('labelNameEn').textContent = isEnglish ? 'Name (English)' : '姓名（英文）';
            document.getElementById('labelPhoneEdit').textContent = isEnglish ? 'Phone' : '電話';
            document.getElementById('labelEmailEdit').textContent = isEnglish ? 'Email' : '電郵';
            document.getElementById('labelSchoolEdit').textContent = isEnglish ? 'School (Chinese)' : '學校（中文）';
            document.getElementById('labelSchoolEnEdit').textContent = isEnglish ? 'School (English)' : '學校（英文）';
            document.getElementById('labelPositionEdit').textContent = isEnglish ? 'Position (Chinese)' : '職位（中文）';
            document.getElementById('labelPositionEnEdit').textContent = isEnglish ? 'Position (English)' : '職位（英文）';
            document.getElementById('labelWebsiteEdit').textContent = isEnglish ? 'Website (optional)' : '網站（可選）';
            document.getElementById('btnSave').textContent = isEnglish ? 'Save' : '儲存';
            document.getElementById('btnCancel').textContent = isEnglish ? 'Cancel' : '取消';
            document.getElementById('btnEditView').textContent = isEnglish ? 'Edit' : '編輯資料';
        }

        // Cancel Edit
        function cancelEdit() {
            document.getElementById('viewMode').classList.remove('hidden');
            document.getElementById('editMode').classList.remove('active');
        }

        // Save Contact
        function saveContact() {
            contacts.name = document.getElementById('inputName').value;
            contacts.nameEn = document.getElementById('inputNameEn').value;
            contacts.phone = document.getElementById('inputPhone').value;
            contacts.email = document.getElementById('inputEmail').value;
            contacts.school = document.getElementById('inputSchool').value;
            contacts.schoolEn = document.getElementById('inputSchoolEn').value;
            contacts.position = document.getElementById('inputPosition').value;
            contacts.positionEn = document.getElementById('inputPositionEn').value;
            contacts.website = document.getElementById('inputWebsite').value;
            
            saveData();
            updateUI();
            cancelEdit();
            
            showToast(isEnglish ? 'Saved!' : '已儲存！');
        }

        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            updateUI();
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
