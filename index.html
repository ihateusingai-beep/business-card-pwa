<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00FF88">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>個人名片 | Personal Card</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00FF88;
            --accent-soft: rgba(0, 255, 136, 0.3);
            --accent-glow: rgba(0, 255, 136, 0.6);
            --bg: #FFFFFF;
            --surface: #F5F5F5;
            --text-primary: #111111;
            --text-secondary: #666666;
            --card-radius: 16px;
            --btn-radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans HK', 'Orbitron', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .hero-image {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: block;
        }

        .card {
            background: var(--bg);
            border-radius: var(--card-radius);
            padding: 24px;
            margin-bottom: 20px;
            border: 2px solid var(--accent-soft);
            box-shadow: 0 4px 24px rgba(0, 255, 136, 0.2);
            animation: gundamGlow 3s ease-in-out infinite;
        }

        @keyframes gundamGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.3); border-color: var(--accent-soft); }
            50%      { box-shadow: 0 0 20px var(--accent-glow); border-color: rgba(0, 255, 136, 0.8); }
        }

        .card-name {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .card-name-en {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 16px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 16px 0;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
        }

        .info-row:last-child { border-bottom: none; }

        .info-icon {
            font-size: 20px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 16px;
            word-break: break-all;
            font-weight: 600;
        }

        .qr-section { text-align: center; }

        .qr-title {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .qr-container {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            border: 2px solid rgba(0, 255, 136, 0.5);
            display: inline-block;
        }

        .qr-container img { display: block; }

        .qr-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .qr-error { color: #c0392b; font-size: 14px; }

        .install-btn {
            display: none;
            margin-top: 20px;
            width: 100%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #0A0A0F;
            border: 2px solid #FFD700;
            animation: installPulse 2s ease-in-out infinite;
        }
        .install-btn.show { display: block; }
        .install-btn.installed {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent);
            border-color: var(--accent);
            animation: none;
            cursor: default;
        }
        @keyframes installPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.6); }
            50%      { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: var(--btn-radius);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary  { background: var(--accent);    color: var(--bg); }
        .btn-secondary{ background: var(--surface);  color: var(--text-primary); }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.4);
        }
        a.btn {
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        a.btn-homepage {
            background: linear-gradient(135deg, #00B4D8 0%, #0077B6 100%);
            color: #fff;
            border: 1px solid rgba(0, 180, 216, 0.6);
        }
        a.btn-homepage:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 180, 216, 0.5);
        }

        .lang-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: transparent;
            border: 1px solid #222;
            color: #222;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .view-mode   { display: block; }
        .view-mode.hidden { display: none; }

        .edit-mode   { display: none; }
        .edit-mode.active { display: block; }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .edit-card-title {
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .edit-card-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }

        .fade-in { animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <button class="lang-toggle" data-action="toggle-lang"></button>

    <div class="container">
        <img class="hero-image"
             src="intro.jpg"
             alt="">

        <div class="view-mode" id="viewMode">
            <div class="card fade-in">
                <div class="card-name"    data-bind="name"></div>
                <div class="card-name-en" data-bind="nameEn"></div>
                <div class="divider"></div>

                <div class="info-row">
                    <span class="info-icon">📱</span>
                    <div>
                        <div class="info-label" data-i18n="labelPhone"></div>
                        <div class="info-value" data-bind="phone"></div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-icon">✉️</span>
                    <div>
                        <div class="info-label" data-i18n="labelEmail"></div>
                        <div class="info-value" data-bind="email"></div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-icon">🏫</span>
                    <div>
                        <div class="info-label" data-i18n="labelSchool"></div>
                        <div class="info-value" data-bind="school"></div>
                    </div>
                </div>
                <div class="info-row">
                    <span class="info-icon">💼</span>
                    <div>
                        <div class="info-label" data-i18n="labelPosition"></div>
                        <div class="info-value" data-bind="position"></div>
                    </div>
                </div>
            </div>

            <div class="card qr-section">
                <div class="qr-title" data-i18n="qrTitle"></div>
                <div class="qr-container">
                    <img id="qrImage" alt="QR Code">
                </div>
                <div class="qr-label" data-i18n="qrLabel"></div>
            </div>

            <button class="btn install-btn" data-action="install-pwa" data-i18n="btnInstall" hidden></button>

            <div class="btn-group">
                <button class="btn btn-secondary" data-action="download-vcard" data-i18n="btnDownload"></button>
                <button class="btn btn-secondary" data-action="play-sound">🔊</button>
                <button class="btn btn-secondary" data-action="switch-card"  data-i18n="btnSwitch"></button>
                <button class="btn btn-secondary" data-action="show-edit"    data-i18n="btnEditView"></button>
                <a class="btn btn-secondary btn-homepage" href="https://ihateusingai-beep.github.io/KenCheng-homepage/" target="_blank" rel="noopener noreferrer" data-i18n="btnHomepage"></a>
            </div>
        </div>

        <div class="edit-mode" id="editMode">
            <div class="card">
                <h2 class="edit-card-title"    data-i18n="editTitle"></h2>
                <p  class="edit-card-subtitle" data-i18n="editSubtitle"></p>

                <div class="form-group">
                    <label class="form-label" data-i18n="labelName"></label>
                    <input class="form-input" data-bind-input="name" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelNameEn"></label>
                    <input class="form-input" data-bind-input="nameEn" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelPhoneEdit"></label>
                    <input class="form-input" data-bind-input="phone" type="tel">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelEmailEdit"></label>
                    <input class="form-input" data-bind-input="email" type="email">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelSchoolEdit"></label>
                    <input class="form-input" data-bind-input="school" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelSchoolEnEdit"></label>
                    <input class="form-input" data-bind-input="schoolEn" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelPositionEdit"></label>
                    <input class="form-input" data-bind-input="position" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelPositionEnEdit"></label>
                    <input class="form-input" data-bind-input="positionEn" type="text">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="labelWebsiteEdit"></label>
                    <input class="form-input" data-bind-input="website" type="url">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary"   data-action="save"   data-i18n="btnSave"></button>
                <button class="btn btn-secondary" data-action="cancel" data-i18n="btnCancel"></button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (() => {
        'use strict';

        // ─── Constants ────────────────────────────────────────────────────
        const STORAGE_KEYS = {
            cards:      'businessCard',
            activeCard: 'currentCard',
        };

        const DEFAULT_CARDS = {
            school: {
                name: '程棨彥',
                nameEn: 'Cheng Kai Yin',
                phone: '92187444',
                email: 'kencheng1204@hotmail.com',
                school: '匡智張玉瓊晨輝學校',
                schoolEn: 'Hong chi Chang Yu King Chan Fai School',
                position: '教師',
                positionEn: 'Teacher',
                website: '',
            },
            personal: {
                name: '程棨彥',
                nameEn: 'Cheng Kai Yin',
                phone: '92187444',
                email: 'kencheng1204@hotmail.com',
                school: '', schoolEn: '',
                position: '', positionEn: '',
                website: '',
            },
        };

        const I18N = {
            zh: {
                toggleLang: 'EN',
                labelPhone: '電話', labelEmail: '電郵',
                labelSchool: '學校', labelPosition: '職位',
                qrTitle: '掃描添加聯絡人', qrLabel: '二維碼',
                btnDownload: '下載聯絡人', btnSwitch: '切換', btnEditView: '編輯資料', btnHomepage: '🏠 個人主頁',
                editTitle: '編輯名片', editSubtitle: '更新您的聯絡資料',
                labelName: '姓名（中文）', labelNameEn: '姓名（英文）',
                labelPhoneEdit: '電話', labelEmailEdit: '電郵',
                labelSchoolEdit: '學校（中文）', labelSchoolEnEdit: '學校（英文）',
                labelPositionEdit: '職位（中文）', labelPositionEnEdit: '職位（英文）',
                labelWebsiteEdit: '網站（可選）',
                btnSave: '儲存', btnCancel: '取消',
                toastSaved: '已儲存！', toastDownloaded: '已下載！',
                toastSwitched: '已切換至', toastActivated: 'Psycho-Frame 共鳴！',
                toastInstalled: '已安裝！', toastInstallFailed: '安裝失敗，請稍後再試',
                btnInstall: '📲 安裝 App', btnInstalled: '✓ 已安裝',
                switchToSchool: '學校', switchToPersonal: '個人',
            },
            en: {
                toggleLang: '中文',
                labelPhone: 'Phone', labelEmail: 'Email',
                labelSchool: 'School', labelPosition: 'Position',
                qrTitle: 'Scan to Add Contact', qrLabel: 'QR Code',
                btnDownload: 'Download Contact', btnSwitch: 'Switch', btnEditView: 'Edit', btnHomepage: '🏠 Homepage',
                editTitle: 'Edit Contact', editSubtitle: 'Update your contact info',
                labelName: 'Name (Chinese)', labelNameEn: 'Name (English)',
                labelPhoneEdit: 'Phone', labelEmailEdit: 'Email',
                labelSchoolEdit: 'School (Chinese)', labelSchoolEnEdit: 'School (English)',
                labelPositionEdit: 'Position (Chinese)', labelPositionEnEdit: 'Position (English)',
                labelWebsiteEdit: 'Website (optional)',
                btnSave: 'Save', btnCancel: 'Cancel',
                toastSaved: 'Saved!', toastDownloaded: 'Downloaded!',
                toastSwitched: 'Switched to ', toastActivated: 'NT-D ACTIVATED!',
                toastInstalled: 'Installed!', toastInstallFailed: 'Install failed, try again later',
                btnInstall: '📲 Install App', btnInstalled: '✓ Installed',
                switchToSchool: 'School', switchToPersonal: 'Personal',
            },
        };

        // ─── State ────────────────────────────────────────────────────────
        const state = {
            cards: structuredClone(DEFAULT_CARDS),
            activeCardId: 'school',
            lang: 'zh',
        };

        const t = (key) => I18N[state.lang][key] ?? key;
        const activeContact = () => state.cards[state.activeCardId];

        // ─── Storage ──────────────────────────────────────────────────────
        const storage = {
            load() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEYS.cards);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (parsed && typeof parsed === 'object') {
                            state.cards = { ...DEFAULT_CARDS, ...parsed };
                        }
                    }
                    const saved = localStorage.getItem(STORAGE_KEYS.activeCard);
                    if (saved && state.cards[saved]) state.activeCardId = saved;
                } catch (err) {
                    console.warn('Storage load failed; using defaults.', err);
                }
            },
            save() {
                try {
                    localStorage.setItem(STORAGE_KEYS.cards, JSON.stringify(state.cards));
                    localStorage.setItem(STORAGE_KEYS.activeCard, state.activeCardId);
                } catch (err) {
                    console.warn('Storage save failed.', err);
                }
            },
        };

        // ─── vCard builder (single source of truth) ───────────────────────
        const buildVCard = (c) => {
            const lines = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:${c.name}`,
                `FN;CHARSET=UTF-8:${c.nameEn}`,
                `TEL;TYPE=CELL:${c.phone}`,
                `EMAIL:${c.email}`,
            ];
            if (c.school)   lines.push(`ORG:${c.school}`);
            if (c.position) lines.push(`TITLE:${c.position}`);
            if (c.website)  lines.push(`URL:${c.website}`);
            lines.push('END:VCARD');
            return lines.join('\n');
        };

        // ─── Domain actions ───────────────────────────────────────────────
        const actions = {
            'toggle-lang': () => {
                state.lang = state.lang === 'zh' ? 'en' : 'zh';
                render();
            },
            'switch-card': () => {
                state.activeCardId = state.activeCardId === 'school' ? 'personal' : 'school';
                storage.save();
                render();
                const label = state.activeCardId === 'school' ? t('switchToSchool') : t('switchToPersonal');
                toast(t('toastSwitched') + (state.lang === 'en' ? ' ' : '') + label);
            },
            'show-edit': () => {
                populateEditForm();
                document.getElementById('viewMode').classList.add('hidden');
                document.getElementById('editMode').classList.add('active');
            },
            'cancel': () => {
                document.getElementById('viewMode').classList.remove('hidden');
                document.getElementById('editMode').classList.remove('active');
            },
            'save': () => {
                const c = activeContact();
                document.querySelectorAll('[data-bind-input]').forEach((el) => {
                    c[el.dataset.bindInput] = el.value;
                });
                storage.save();
                document.getElementById('viewMode').classList.remove('hidden');
                document.getElementById('editMode').classList.remove('active');
                render();
                toast(t('toastSaved'));
            },
            'download-vcard': () => {
                const vcard = buildVCard(activeContact());
                const blob = new Blob([vcard], { type: 'text/vcard' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${activeContact().name}.vcf`;
                a.click();
                URL.revokeObjectURL(url);
                toast(t('toastDownloaded'));
            },
            'play-sound': () => playGundamSound(),
            'install-pwa': () => installPWA(),
        };

        // ─── Audio: Gundam NT-D activation ────────────────────────────────
        let audioCtx = null;
        const getAudioCtx = () => {
            if (!audioCtx) {
                const Ctor = window.AudioContext || window.webkitAudioContext;
                if (!Ctor) return null;
                audioCtx = new Ctor();
            }
            return audioCtx;
        };

        const playTone = (ctx, { type, freqStart, freqEnd, gainStart, start, dur }) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = type;
            const t0 = ctx.currentTime + start;
            osc.frequency.setValueAtTime(freqStart, t0);
            osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + dur);
            gain.gain.setValueAtTime(gainStart, t0);
            gain.gain.exponentialRampToValueAtTime(0.01, t0 + dur);
            osc.start(t0);
            osc.stop(t0 + dur);
        };

        const playGundamSound = () => {
            const ctx = getAudioCtx();
            if (!ctx) return;
            playTone(ctx, { type: 'sine',     freqStart: 200,  freqEnd: 800,  gainStart: 0.3, start: 0,   dur: 0.5 });
            playTone(ctx, { type: 'triangle', freqStart: 400,  freqEnd: 1200, gainStart: 0.2, start: 0.3, dur: 0.5 });
            toast(t('toastActivated'));
        };

        // ─── QR ───────────────────────────────────────────────────────────
        const renderQR = () => {
            const img = document.getElementById('qrImage');
            const vcard = buildVCard(activeContact());
            img.style.display = '';
            img.onerror = () => {
                img.style.display = 'none';
                img.insertAdjacentHTML('afterend', '<p class="qr-error">請稍後再試</p>');
                img.onerror = null;
            };
            img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(vcard)}`;
        };

        // ─── Toast ────────────────────────────────────────────────────────
        let toastTimer = null;
        const toast = (msg) => {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
        };

        // ─── Render: single pass, no scattered mutations ──────────────────
        const render = () => {
            // i18n
            document.querySelectorAll('[data-i18n]').forEach((el) => {
                const key = el.dataset.i18n;
                if (I18N[state.lang][key] !== undefined) el.textContent = I18N[state.lang][key];
            });

            // data bindings
            const c = activeContact();
            const lang = state.lang;
            document.querySelectorAll('[data-bind]').forEach((el) => {
                const key = el.dataset.bind;
                let value = c[key] ?? '';
                // bilingual display for school / position
                if (key === 'school' || key === 'position') {
                    const en = c[`${key}En`];
                    value = lang === 'en' && en ? en : value;
                }
                el.textContent = value;
            });

            renderQR();
            refreshInstallButton();
        };

        const populateEditForm = () => {
            const c = activeContact();
            document.querySelectorAll('[data-bind-input]').forEach((el) => {
                el.value = c[el.dataset.bindInput] ?? '';
            });
        };

        // ─── Event delegation ─────────────────────────────────────────────
        document.addEventListener('click', (e) => {
            const target = e.target.closest('[data-action]');
            if (!target) return;
            const action = actions[target.dataset.action];
            if (action) action();
        });

        // ─── PWA install ─────────────────────────────────────────────────
        let deferredInstallPrompt = null;
        let isInstalled = false;

        const refreshInstallButton = () => {
            const btn = document.querySelector('[data-action="install-pwa"]');
            if (!btn) return;
            if (isInstalled) {
                btn.classList.add('installed', 'show');
                btn.hidden = false;
                btn.disabled = true;
                btn.textContent = t('btnInstalled');
            } else if (deferredInstallPrompt) {
                btn.classList.add('show');
                btn.classList.remove('installed');
                btn.hidden = false;
                btn.disabled = false;
                btn.textContent = t('btnInstall');
            } else {
                btn.classList.remove('show', 'installed');
                btn.hidden = true;
            }
        };

        const installPWA = async () => {
            if (isInstalled) return;
            if (!deferredInstallPrompt) {
                // iOS / unsupported: give instruction
                const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                if (isiOS) {
                    toast(state.lang === 'en'
                        ? 'Tap Share → Add to Home Screen'
                        : '點一下分享 → 加到主畫面');
                } else {
                    toast(t('toastInstallFailed'));
                }
                return;
            }
            deferredInstallPrompt.prompt();
            const choice = await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            if (choice && choice.outcome === 'accepted') {
                isInstalled = true;
                toast(t('toastInstalled'));
                refreshInstallButton();
            } else {
                refreshInstallButton();
            }
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            refreshInstallButton();
        });

        window.addEventListener('appinstalled', () => {
            isInstalled = true;
            deferredInstallPrompt = null;
            refreshInstallButton();
        });

        // ─── Bootstrap ────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            storage.load();
            // Detect already-installed (standalone display mode)
            isInstalled = window.matchMedia('(display-mode: standalone)').matches
                       || window.navigator.standalone === true;
            render();

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        });
    })();
    </script>
</body>
</html>
